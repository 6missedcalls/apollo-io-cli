name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake curl sqlite3 2>/dev/null || true

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p dist/apollo
          cp build/apollo dist/apollo/
          cp LICENSE dist/apollo/
          cd dist && tar czf apollo-darwin-arm64.tar.gz apollo/

      - uses: actions/upload-artifact@v4
        with:
          name: apollo-darwin-arm64
          path: dist/apollo-darwin-arm64.tar.gz

  build-macos-x86_64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake curl sqlite3 2>/dev/null || true

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p dist/apollo
          cp build/apollo dist/apollo/
          cp LICENSE dist/apollo/
          cd dist && tar czf apollo-darwin-x86_64.tar.gz apollo/

      - uses: actions/upload-artifact@v4
        with:
          name: apollo-darwin-x86_64
          path: dist/apollo-darwin-x86_64.tar.gz

  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev libsqlite3-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist/apollo
          cp build/apollo dist/apollo/
          cp LICENSE dist/apollo/
          cd dist && tar czf apollo-linux-x86_64.tar.gz apollo/

      - uses: actions/upload-artifact@v4
        with:
          name: apollo-linux-x86_64
          path: dist/apollo-linux-x86_64.tar.gz

  release:
    needs: [build-macos-arm64, build-macos-x86_64, build-linux-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/sha256sums.txt
